<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

  <body th:fragment="body(contents, scripts)">
    <main class="container-md p-3">
      <th:block th:insert="${contents}" th:remove="tag"></th:block>
    </main>

    <!-- JavaScript -->
    <script th:src="@{/js/index.js}"></script>
    <script th:src="@{/js/vendor.js}"></script>

    <!-- Optional Scripts -->
    <th:block th:replace="${scripts}"></th:block>
  </body>

</html>
