<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>DETAIL</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous">
  </head>

  <body>
    <main class="container-fluid p-md-5 w-auto">
      <div>
        <a th:href="@{__${@URL.URL_TODO_LIST}__}">To List</a>
      </div>

      <!--/*@thymesVar id="todoInfo" type=""*/-->
      <div th:object="${todoInfo}">
        <div class="row mb-3">
          <label th:for="*{#ids.next('id')}" class="col-sm-2 col-form-label"
            >ID</label
          >
          <div class="col-sm-10">
            <span class="form-control-plaintext" th:text="*{id}"></span>
          </div>
        </div>
        <div class="row mb-3">
          <label
            th:for="*{#ids.next('process')}"
            class="col-sm-2 col-form-label"
            >状態</label
          >
          <div class="col-sm-10">
            <span class="form-control-plaintext" th:text="*{process}"></span>
          </div>
        </div>
        <div class="row mb-3">
          <label th:for="*{#ids.next('text')}" class="col-sm-2 col-form-label"
            >状態</label
          >
          <div class="col-sm-10">
            <span class="form-control-plaintext" th:text="*{text}"></span>
          </div>
        </div>
        <div class="row mb-3">
          <label
            th:for="*{#ids.next('createAt')}"
            class="col-sm-2 col-form-label"
            >状態</label
          >
          <div class="col-sm-10">
            <span class="form-control-plaintext" th:text="*{createAt}"></span>
          </div>
        </div>
        <div class="row mb-3">
          <label
            th:for="*{#ids.next('updateAt')}"
            class="col-sm-2 col-form-label"
            >状態</label
          >
          <div class="col-sm-10">
            <span class="form-control-plaintext" th:text="*{updateAt}"></span>
          </div>
        </div>
        <div class="col gap-5">
          <a
            th:href="@{__${@URL.URL_TODO_EDIT}__/__*{id}__}"
            class="btn btn-primary row-cols-6 mx-auto"
            name="update"
            role="button"
            >更新</a
          >
          <button
            type="button"
            class="btn btn-danger row-cols-6 mx-auto"
            name="delete"
          >
            削除
          </button>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
