<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>EDIT</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous">
  </head>

  <body>
    <main class="container-fluid p-md-5 w-auto">
      <form th:object="${todoInfo}"
        th:action="@{__${@URL.URL_TODO_EDIT_CONFIRM}__}" method="post">
        <div class="row mb-3">
          <label th:for="*{#ids.next('id')}" class="col-sm-2 col-form-label">ID</label>

          <input type="text" th:field="*{id}" th:class="form-control">
        </div>
        <div class="row mb-3">
          <label
            th:for="*{#ids.next('process')}"
            class="col-sm-2 col-form-label"
            >状態</label>

          <input type="text" th:field="*{process}" th:class="form-control">
        </div>
        <div class="row mb-3">
          <label th:for="*{#ids.next('text')}" class="col-sm-2 col-form-label">状態</label>

          <input type="text" th:field="*{text}" th:class="form-control">
        </div>
        <div class="row mb-3">
          <label
            th:for="*{#ids.next('createAt')}"
            class="col-sm-2 col-form-label"
            >状態</label>

          <input type="text" th:field="*{createAt}" th:class="form-control">
        </div>
        <div class="row mb-3">
          <label
            th:for="*{#ids.next('updateAt')}"
            class="col-sm-2 col-form-label"
            >状態</label>

          <input type="text" th:field="*{updateAt}" th:class="form-control">
        </div>
        <div class="col gap-5">
          <button
            type="submit"
            class="btn btn-secondary row-cols-6 mx-auto"
            name="back"
          >
            戻る
          </button>
          <button
          type="submit"
            class="btn btn-primary row-cols-6 mx-auto"
            name="enter"
          >
            更新
          </button>
        </div>
      </form>
    </main>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
