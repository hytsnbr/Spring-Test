<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>LIST</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous">
  </head>

  <body>
    <main class="container-fluid p-md-5 w-auto">
      <div>
        <a th:href="@{__${@URL.URL_TODO_NEW}__}">[[${@URL.URL_TODO_NEW}]]</a>
      </div>

      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>ID</th>
              <th>状態</th>
              <th>内容</th>
              <!-- <th>開始</th> -->
              <!-- <th>終了</th> -->
              <th>作成日</th>
              <th>更新日</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="todoInfo : ${todoInfoList}">
              <td class="text-nowrap">
                <a th:href="@{__${@URL.URL_TODO_DETAIL}__/__${todoInfo.id}__}"
                  th:text="${todoInfo.id}"></a>
              </td>
              <td class="text-nowrap"
                th:text="${processingList[todoInfo.process].getName()}"></td>
              <td class="text-nowrap" th:text="${todoInfo.text}"></td>
              <td class="text-nowrap" th:text="${todoInfo.createAt}"></td>
              <td class="text-nowrap" th:text="${todoInfo.updateAt}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"></script>
  </body>

</html>
